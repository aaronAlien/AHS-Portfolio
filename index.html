    <title>... under construction ...</title>

    <style>
      :root {
        --bg: #0b0b0f;
        --card-bg: rgba(10, 10, 15, 0.92);
        --border: rgba(255, 255, 255, 0.08);
        --text-primary: #eaeaf0;
        --text-secondary: #a1a1b3;
        --accent: #7c5cff;
        --radius: 28px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        font-family:
          "Anonymous Pro",
          monospace,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        color: var(--text-primary);
        padding: 24px;
      }

      /* Card */
      .card {
        width: 100%;
        max-width: 380px;
        min-height: 640px;
        background: var(--card-bg);
        border-radius: var(--radius);
        border: 1px solid var(--border);
        padding: 32px 24px;
        position: relative;
        display: flex;
        flex-direction: column;
        box-shadow:
          0 0 0 1px rgba(124, 92, 255, 0.12),
          0 0 24px rgba(124, 92, 255, 0.18);
      }

      /* Avatar */
      .avatar {
        width: 84px;
        height: 84px;
        border-radius: 50%;
        border: 2px solid var(--accent);
        overflow: hidden;
        margin-bottom: 24px;
      }

      .avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      /* Name */
      .name {
        font-size: 2.2rem;
        line-height: 1.05;
        font-weight: 700;
        color: var(--accent);
        margin: 0 0 20px 0;
      }

      /* Text */
      .content {
        font-size: 0.9rem;
        line-height: 1.6;
        color: var(--text-primary);
        max-width: 90%;
        font-weight: 600;
      }

      .content p {
        margin: 0 0 12px 0;
      }

      /* Email button */
      .email {
        margin-top: 20px;
        align-self: flex-start;
        text-decoration: none;
        font-size: 0.85rem;
        color: var(--accent);
        background: rgba(255, 255, 255, 0.05);
        padding: 10px 16px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: background 0.2s ease;
      }

      .email:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .email svg {
        width: 16px;
        height: 16px;
        stroke: currentColor;
      }

      /* Footer icons */
      .socials {
        position: absolute;
        bottom: 20px;
        right: 20px;
        display: flex;
        gap: 12px;
      }

      .socials a {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.06);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--accent);
        text-decoration: none;
        transition:
          background 0.2s ease,
          transform 0.2s ease;
      }

      .socials a:hover {
        background: rgba(255, 255, 255, 0.12);
        transform: translateY(-1px);
      }

      .socials svg {
        width: 18px;
        height: 18px;
        fill: currentColor;
      }

      @media (min-width: 640px) {
        .card {
          padding: 40px 32px;
        }

        .name {
          font-size: 2.4rem;
        }
      }
    </style>
  </head>
